<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note Sidebar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff; color: #1a1a2e;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #e8eaed;
    }
    .logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: #e8f0fe; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .logo img { width: 22px; height: 22px; }
    .title { font-size: 15px; font-weight: 700; color: #1a73e8; }
    .version { font-size: 11px; color: #9aa0a6; margin-top: 1px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #f1f3f4; }

    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-gemini { background: #1a73e8; }
    .btn-gemini:hover { background: #1557b0; }
    .btn-notebook { background: #34a853; }
    .btn-notebook:hover { background: #2d9147; }

    .footer {
      padding: 8px 16px; font-size: 10px; color: #9aa0a6; text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="icons/icon48.png" alt="logo" />
    </div>
    <div>
      <div class="title">Note Sidebar</div>
      <div class="version">v1.2.0</div>
    </div>
  </div>

  <div class="section" style="display:flex; flex-direction:column; gap:8px;">
    <button class="btn btn-gemini" id="geminiBtn">打开 Gemini 侧边栏</button>
    <button class="btn btn-notebook" id="notebookBtn">打开 NotebookLM 侧边栏</button>
  </div>

  <div class="footer">Works on any http/https page</div>

  <script src="popup.js"></script>
</body>
</html>
